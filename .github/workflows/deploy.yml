name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# GitHub Pages 배포에 필요한 권한 설정 (중요!)
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 하나의 배포만 허용
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 빌드 작업
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 저장소
        uses: actions/checkout@v4

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: 배포 파일 준비
        run: |
          # index.html.txt를 index.html로 복사
          cp index.html.txt index.html
          # 필요한 경우 다른 정적 파일들도 복사
          mkdir -p _site
          cp index.html _site/
          # CLAUDE.md는 제외 (배포에 불필요)

      - name: 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  # 배포 작업
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4